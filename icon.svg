<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" fill="#0b0d10"/>
  <!-- a single wave crest, echoing the app's own animated wave motif -->
  <path d="M0 118 Q22 100 45 118 T90 118 T135 118 T180 118 V180 H0 Z" fill="#0a7aff"/>
  <path d="M0 100 Q22 84 45 100 T90 100 T135 100 T180 100" fill="none" stroke="#0a7aff" stroke-width="7" stroke-linecap="round" opacity=".55"/>
  <!-- surfboard, tilted, riding the crest -->
  <g transform="translate(90 74) rotate(-32)">
    <rect x="-13" y="-46" width="26" height="92" rx="13" fill="#fff"/>
    <rect x="-1.4" y="-40" width="2.8" height="80" fill="#0b0d10" opacity=".3"/>
  </g>
</svg>
