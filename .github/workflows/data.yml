name: Refresh beach data

on:
  schedule:
    - cron: "10 * * * *" # hourly; city data changes ~daily but advisories can flip
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/**
      - beaches.js
      - .github/workflows/data.yml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: data-refresh

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fetch-conditions.mjs
      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet -- data/conditions.json; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "beachcheck data"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/conditions.json
          git commit -m "data: refresh beach conditions"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  # Pushes made with GITHUB_TOKEN don't trigger the pages workflow, so
  # redeploy from here whenever the data commit happened.
  deploy:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
