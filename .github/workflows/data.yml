name: Refresh beach data

on:
  schedule:
    - cron: "10 * * * *" # hourly; city data changes ~daily but advisories can flip
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fetch-conditions.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet -- data/conditions.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "beachcheck data"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/conditions.json
          git commit -m "data: refresh beach conditions"
          git push
