name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache-bust asset URLs
        run: |
          V="${GITHUB_SHA}"
          sed -i \
            -e "s/href=\"style\.css\"/href=\"style.css?v=$V\"/" \
            -e "s/src=\"app\.js\"/src=\"app.js?v=$V\"/" \
            -e "s#import(\"./mapkit-bridge.js\")#import(\"./mapkit-bridge.js?v=$V\")#" \
            index.html
          sed -i \
            -e "s#from \"./mapkit-bridge.js\"#from \"./mapkit-bridge.js?v=$V\"#" \
            -e "s#from \"./beaches.js\"#from \"./beaches.js?v=$V\"#" \
            app.js
          sed -i "s#from \"./beaches.js\"#from \"./beaches.js?v=$V\"#" mapkit-bridge.js
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
